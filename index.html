<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitarra con Jose | Neuro-Training</title>
    <style>
        :root { --primary: #fbbf24; --bg: #050811; --card: #111827; --text: #f8fafc; --success: #10b981; }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        
        /* HEADER GAMIFICADO */
        .status-bar { width: 100%; background: #1f2937; padding: 15px 0; display: flex; justify-content: center; gap: 20px; sticky: top; z-index: 1000; border-bottom: 1px solid #374151; }
        .stat { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 0.9em; }
        .fire { color: #f97316; filter: drop-shadow(0 0 5px #f97316); }

        /* PANTALLA DE ACCESO */
        #auth-screen { max-width: 400px; width: 90%; text-align: center; margin-top: 60px; background: var(--card); padding: 40px 20px; border-radius: 30px; border: 1px solid #374151; }
        input { width: 80%; padding: 15px; margin: 20px 0; border: 2px solid #374151; background: #050811; color: white; border-radius: 15px; text-align: center; }
        .btn-main { background: var(--primary); color: #000; border: none; padding: 18px 40px; border-radius: 15px; font-weight: 900; cursor: pointer; width: 90%; text-transform: uppercase; }

        /* APP CONTENT */
        #app-content { display: none; width: 95%; max-width: 500px; margin-top: 20px; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* NIVEL Y XP */
        .xp-container { background: #1f2937; height: 12px; border-radius: 6px; margin: 10px 0; overflow: hidden; border: 1px solid #374151; }
        #xp-bar { background: linear-gradient(90deg, #fbbf24, #f59e0b); height: 100%; width: 0%; transition: width 0.5s; }

        /* VISUALIZADOR PRO */
        .main-stage { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 25px; margin-bottom: 20px; overflow: hidden; border: 2px solid #374151; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .main-stage img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .badge-pop { position: absolute; top: 10px; right: 10px; background: var(--primary); color: black; padding: 5px 12px; border-radius: 20px; font-size: 0.7em; font-weight: 900; display: none; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { scale: 0; } to { scale: 1; } }

        /* TAREAS INTERACTIVAS */
        .task-box { background: var(--card); padding: 20px; border-radius: 25px; border: 1px solid #374151; margin-bottom: 80px; }
        .task-card { background: #050811; padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 4px solid #374151; transition: 0.3s; }
        .task-card.done { border-left-color: var(--success); background: #064e3b33; }

        /* BARRA NAVEGACIÓN */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(10px); padding: 20px; display: flex; gap: 10px; border-top: 1px solid #374151; }
        .btn-nav { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-next { background: var(--primary); color: black; }
        .btn-next:disabled { filter: grayscale(1); opacity: 0.5; }
    </style>
</head>
<body>

<div class="status-bar" id="top-bar" style="display: none;">
    <div class="stat fire">🔥 <span id="streak-val">0</span> DÍAS</div>
    <div class="stat">⭐ NIVEL: <span id="level-val">NOVATO</span></div>
    <div class="stat" style="color: var(--primary);">XP: <span id="xp-val">0</span></div>
</div>

<div id="auth-screen">
    <div class="logo-circle">1%</div>
    <h2 style="margin: 0;">Jose Guitar</h2>
    <p style="color: #94a3b8; font-size: 0.8em;">Neuro-Entrenamiento de Guitarra</p>
    <input type="text" id="pass-input" placeholder="Clave de Acceso">
    <button class="btn-main" onclick="login()">DESBLOQUEAR MI POTENCIAL</button>
</div>

<div id="app-content">
    <div class="xp-container"><div id="xp-bar"></div></div>
    
    <div class="main-stage">
        <img id="lesson-img" src="" alt="Clase">
        <div id="badge" class="badge-pop">¡LOGRO DESBLOQUEADO!</div>
    </div>

    <div class="task-box">
        <h3 id="lesson-title" style="margin-top: 0;"></h3>
        <p id="lesson-desc" style="font-size: 0.9em; color: #94a3b8; margin-bottom: 20px;"></p>
        <div id="tasks-list"></div>
    </div>
</div>

<div class="nav-bar" id="nav-bar" style="display: none;">
    <button class="btn-nav" style="background: #374151; color: white;" onclick="changeDay(-1)">ANTERIOR</button>
    <button class="btn-nav btn-next" id="timer-btn" onclick="changeDay(1)">CARGANDO ENTRENAMIENTO...</button>
</div>

<script>
    const KEY = "GUITARRA1";
    let currentDay = parseInt(localStorage.getItem('jg_day')) || 0;
    let xp = parseInt(localStorage.getItem('jg_xp')) || 0;
    let streak = parseInt(localStorage.getItem('jg_streak')) || 0;
    let timer;

    const levels = ["NOVATO", "APRENDIZ", "RITMISTA", "SOLISTA", "MAESTRO", "LEYENDA"];

    const course = [
        { t: "La Postura del Guerrero", d: "Aprende a sostener la guitarra sin fatiga muscular.", img: "https://images.unsplash.com/photo-1550291652-6ea9114a47b1?q=80&w=800", steps: ["Siéntate en el borde de la silla", "Mástil a 45 grados", "Relaja el hombro izquierdo"] },
        { t: "El Pilar: Do Mayor (C)", d: "El acorde más importante de la música occidental.", img: "https://images.unsplash.com/photo-1510915361894-db8b60106cb1?q=80&w=800", steps: ["Dedo 1: T1 C2", "Dedo 2: T2 C4", "Dedo 3: T3 C5", "No toques la cuerda 6"] },
        { t: "Energía: Mi Mayor (E)", d: "Siente la potencia de las cuerdas al aire.", img: "https://images.unsplash.com/photo-1516924962500-2b4b3b99ea02?q=80&w=800", steps: ["D1 en T1 C3", "D2 en T2 C5", "D3 en T2 C4", "Rasca las 6 cuerdas"] },
        // ... añadir hasta 30
    ];

    function login() {
        if(document.getElementById('pass-input').value.toUpperCase() === KEY) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('nav-bar').style.display = 'flex';
            document.getElementById('top-bar').style.display = 'flex';
            checkStreak();
            updateUI();
        } else { alert("Clave inválida"); }
    }

    function checkStreak() {
        const lastLogin = localStorage.getItem('jg_last_date');
        const today = new Date().toDateString();
        
        if (lastLogin !== today) {
            if (lastLogin === new Date(Date.now() - 86400000).toDateString()) {
                streak++;
            } else if (!lastLogin) {
                streak = 1;
            } else {
                streak = 1; // Racha rota
            }
            localStorage.setItem('jg_last_date', today);
            localStorage.setItem('jg_streak', streak);
        }
        document.getElementById('streak-val').innerText = streak;
    }

    function updateUI() {
        const data = course[currentDay] || course[0];
        document.getElementById('lesson-title').innerText = data.t;
        document.getElementById('lesson-desc').innerText = data.d;
        document.getElementById('lesson-img').src = data.img;
        
        // Cargar tareas
        const list = document.getElementById('tasks-list');
        list.innerHTML = "";
        data.steps.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = "task-card";
            div.innerHTML = `<b>${i+1}.</b> ${s}`;
            list.appendChild(div);
        });

        // Niveles y XP
        const levelIdx = Math.floor(xp / 500);
        document.getElementById('level-val').innerText = levels[levelIdx] || "MAESTRO";
        document.getElementById('xp-val').innerText = xp;
        document.getElementById('xp-bar').style.width = `${(xp % 500) / 5}%`;

        startTimer();
    }

    function startTimer() {
        const btn = document.getElementById('timer-btn');
        let sec = 300; // 5 minutos de práctica real
        btn.disabled = true;

        clearInterval(timer);
        timer = setInterval(() => {
            sec--;
            let m = Math.floor(sec / 60);
            let s = sec % 60;
            btn.innerText = `ENTRENANDO: ${m}:${s < 10 ? '0' : ''}${s}`;
            
            // Sumar XP por segundo de práctica
            xp += 1;
            document.getElementById('xp-val').innerText = xp;
            localStorage.setItem('jg_xp', xp);

            if(sec <= 0) {
                clearInterval(timer);
                btn.disabled = false;
                btn.innerText = "¡1% COMPLETADO! SIGUIENTE →";
                showBadge("¡SESIÓN COMPLETADA +100 XP!");
                xp += 100;
            }
        }, 1000);
    }

    function showBadge(msg) {
        const b = document.getElementById('badge');
        b.innerText = msg;
        b.style.display = 'block';
        setTimeout(() => b.style.display = 'none', 3000);
    }

    function changeDay(dir) {
        if(currentDay + dir >= 0 && currentDay + dir < 30) {
            currentDay += dir;
            localStorage.setItem('jg_day', currentDay);
            updateUI();
            window.scrollTo(0,0);
        }
    }
</script>
</body>
</html>
