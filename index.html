<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cwa Powerfit 30 días</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --success: #10b981; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; margin: 0; }
        
        /* Pantalla de Acceso */
        #auth-screen { 
            max-width: 400px; width: 100%; text-align: center; margin-top: 50px; 
            background: var(--card); padding: 40px 20px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
        .logo { font-size: 50px; margin-bottom: 10px; }
        h2 { color: var(--primary); margin-bottom: 5px; }
        input { width: 85%; padding: 15px; margin: 20px 0; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1em; text-align: center; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: var(--primary); }
        .btn-unlock { background: var(--success); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 90%; font-size: 1.1em; transition: transform 0.2s; }
        .btn-unlock:active { transform: scale(0.98); }
        
        /* Contenedor de la App */
        #app-content { display: none; max-width: 500px; width: 100%; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .card { background: var(--card); padding: 25px; border-radius: 24px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); text-align: center; }
        .day-badge { background: var(--primary); color: white; padding: 6px 18px; border-radius: 20px; font-weight: bold; display: inline-block; margin-bottom: 15px; }
        ul { list-style: none; padding: 0; text-align: left; margin: 25px 0; }
        li { padding: 14px 0; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; font-size: 1.05em; }
        li::before { content: "⚡"; margin-right: 12px; color: var(--primary); }
        
        .controls { display: flex; justify-content: space-between; gap: 12px; margin-top: 25px; }
        .nav-btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 14px; cursor: pointer; flex: 1; font-weight: bold; transition: opacity 0.3s; }
        .nav-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        
        .pro-tip { margin-top: 25px; font-size: 0.95em; font-style: italic; color: #64748b; border-top: 1px dashed #cbd5e1; padding-top: 20px; line-height: 1.4; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="logo">💪</div>
    <h2>Cwa Powerfit 30 días</h2>
    <p>Introduce tu clave de acceso</p>
    <input type="text" id="pass-input" placeholder="Clave de activación">
    <button class="btn-unlock" id="unlock-button">ACTIVAR MI PLAN</button>
    <p style="font-size: 0.8em; color: #94a3b8; margin-top: 25px;">¿Problemas con tu clave? <br> Contacta con soporte@cwapowerfit.com</p>
</div>

<div id="app-content">
    <header style="text-align: center; margin-bottom: 20px;">
        <h1 style="color: var(--primary);">Cwa Powerfit</h1>
    </header>
    <div class="card">
        <div id="day-label" class="day-badge">Día 1</div>
        <h2 id="day-title" style="color: var(--text); margin-top: 0;"></h2>
        <ul id="exercise-list"></ul>
        <p class="pro-tip" id="pro-tip"></p>
        <div class="controls">
            <button class="nav-btn" id="prevBtn">Anterior</button>
            <button class="nav-btn" id="nextBtn">Siguiente</button>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN ---
    const SECRET_KEY = "123456"; 
    let currentDay = 0;

    const plan = [
        { title: "Despertar Postural", exercises: ["10 Rotaciones cuello", "15 Aperturas pecho", "Plancha 30s"], tip: "Monitor a la altura de los ojos hoy." },
        { title: "Adiós Silla", exercises: ["20 Sentadillas silla", "10 Estocadas", "Estiramiento Psoas"], tip: "Levántate cada 50 minutos sin falta." },
        { title: "Espalda Fuerte", exercises: ["15 Supermans (suelo)", "10 Bird-Dog", "Plancha 40s"], tip: "No cruces las piernas al estar sentado." },
        { title: "Hombros Libres", exercises: ["15 Giros hombros", "10 Flexiones pared", "Estiramiento tríceps"], tip: "Bebe un vaso de agua tras cada reunión." },
        { title: "Core Estable", exercises: ["30s Plancha lateral", "15 Deadbugs", "10 Puentes glúteo"], tip: "Tu espalda baja debe tocar el respaldo." },
        { title: "Circuito Energía", exercises: ["20 Jumping Jacks", "10 Sentadillas", "10 Flexiones"], tip: "Trabaja de pie 15 minutos si puedes." },
        { title: "Estiramiento Total", exercises: ["5 min Yoga suave", "Estiramiento cuello", "Respiración profunda"], tip: "Día de descanso activo. Camina fuera de casa." },
        { title: "Tren Inferior", exercises: ["25 Sentadillas", "15 Zancadas", "Silla isométrica 30s"], tip: "Usa calzado cómodo, aunque estés en casa." },
        { title: "Tren Superior", exercises: ["12 Flexiones suelo", "15 Fondos sofá", "Plancha 30s"], tip: "Limpia tu escritorio, despeja tu mente." },
        { title: "Cardio Express", exercises: ["30 Mountain Climbers", "20 Skiping", "Plancha 45s"], tip: "La fatiga mental se combate con movimiento." },
        { title: "Espalda de Acero", exercises: ["15 Bird-Dog lentos", "15 Superman", "Remo imaginario"], tip: "Regla 20-20-20: Mira lejos cada 20 minutos." },
        { title: "Glúteos y Core", exercises: ["20 Puentes glúteo", "15 Clamshells", "Plancha 1 min"], tip: "Aprieta el abdomen voluntariamente al escribir." },
        { title: "Reto de Brazos", exercises: ["20 Flexiones pared", "20 Fondos silla", "Círculos brazos"], tip: "Evita la cafeína después de las 3 PM." },
        { title: "Relax Activo", exercises: ["Estiramiento largo", "Caminar 30 min", "Movilidad articular"], tip: "Desconecta las notificaciones de trabajo hoy." },
        { title: "Quemando Calorías", exercises: ["30s Burpees", "30s Descanso", "Repetir 5 veces"], tip: "Ventila tu zona de trabajo antes de empezar." },
        { title: "Piernas de Hierro", exercises: ["15 Sentadillas salto", "20 Zancadas", "1 min Silla pared"], tip: "Usa las escaleras en lugar del ascensor." },
        { title: "Abdominales", exercises: ["20 Crunches", "20 Toques talón", "30s Bicicleta"], tip: "Cena ligero para mejorar tu sueño." },
        { title: "Pecho y Tríceps", exercises: ["15 Flexiones", "15 Fondos", "Plancha diamante"], tip: "Organiza tu agenda de mañana antes de dormir." },
        { title: "Agilidad", exercises: ["40 Jumping Jacks", "20 Escaladores", "10 Burpees"], tip: "Si sientes tensión cervical, estira 2 minutos." },
        { title: "Postura Perfecta", exercises: ["Wall slide 15 reps", "Plancha", "Apertura pecho"], tip: "Mantén los hombros lejos de tus orejas." },
        { title: "Recuperación", exercises: ["Estiramiento yoga", "Baño caliente", "Meditación 5 min"], tip: "Hoy es para ti. Lee algo que no sea de trabajo." },
        { title: "Full Body 1", exercises: ["20 Sentadillas", "15 Flexiones", "20 Abdominales"], tip: "Ya falta poco, ¡mantén la disciplina!" },
        { title: "Full Body 2", exercises: ["20 Zancadas", "15 Fondos", "1 min Plancha"], tip: "Nota cómo ha mejorado tu energía por la tarde." },
        { title: "Explosividad", exercises: ["30s Burpees", "30s Jumping Jacks", "30s Escaladores"], tip: "La constancia supera al talento." },
        { title: "Fuerza Máxima", exercises: ["Flexiones al fallo", "Sentadillas al fallo", "Plancha al fallo"], tip: "Eres mucho más fuerte que hace 3 semanas." },
        { title: "Movilidad Pro", exercises: ["Saludo al sol x5", "Estiramiento Cobra", "Postura del niño"], tip: "Un cuerpo flexible ayuda a una mente flexible." },
        { title: "Resistencia", exercises: ["Plancha 1:30 min", "50 Jumping Jacks", "20 Flexiones"], tip: "Sonríe, estás creando un hábito de vida." },
        { title: "Repaso General", exercises: ["10 reps de cada ejercicio favorito"], tip: "El progreso es progreso, por pequeño que sea." },
        { title: "El Desafío Final", exercises: ["Circuito HIIT 10 min sin parar"], tip: "Prepara una celebración para mañana." },
        { title: "¡Victoria!", exercises: ["30 min de actividad favorita", "Gran Celebración"], tip: "¡Felicidades! Has completado el Cwa Powerfit." }
    ];

    function showApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        updateUI();
    }

    function updateUI() {
        const data = plan[currentDay];
        document.getElementById('day-label').innerText = `Día ${currentDay + 1}`;
        document.getElementById('day-title').innerText = data.title;
        document.getElementById('pro-tip').innerText = `💡 Tip Warrior: ${data.tip}`;
        
        const list = document.getElementById('exercise-list');
        list.innerHTML = "";
        data.exercises.forEach(ex => {
            const li = document.createElement('li');
            li.innerText = ex;
            list.appendChild(li);
        });

        document.getElementById('prevBtn').disabled = (currentDay === 0);
        document.getElementById('nextBtn').disabled = (currentDay === plan.length - 1);
    }

    // Lógica del botón de desbloqueo
    document.getElementById('unlock-button').onclick = function() {
        const userPass = document.getElementById('pass-input').value.trim().toUpperCase();
        if (userPass === SECRET_KEY) {
            localStorage.setItem('cwa_unlocked', 'true');
            showApp();
        } else {
            alert("Clave incorrecta. Por favor, verifica tu compra.");
        }
    };

    // Navegación
    document.getElementById('prevBtn').onclick = () => { if(currentDay > 0) { currentDay--; updateUI(); } };
    document.getElementById('nextBtn').onclick = () => { if(currentDay < plan.length - 1) { currentDay++; updateUI(); } };

    // Autologin
    window.onload = function() {
        if (localStorage.getItem('cwa_unlocked') === 'true') {
            showApp();
        }
    };
</script>
</body>
</html>
