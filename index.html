<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitarra con Jose | App de Entrenamiento</title>
    <style>
        :root { --primary: #fbbf24; --bg: #0a0f1d; --card: #161e2d; --text: #f8fafc; --accent: #f59e0b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 10px; min-height: 100vh; margin: 0; padding-bottom: 100px; }
        
        /* Acceso */
        #auth-screen { max-width: 450px; width: 100%; text-align: center; margin-top: 40px; background: var(--card); padding: 40px 25px; border-radius: 28px; border: 1px solid #2d3748; }
        .logo-circle { width: 70px; height: 70px; background: var(--primary); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; margin: 0 auto 20px; }
        input { width: 80%; padding: 15px; margin-bottom: 15px; border: 2px solid #2d3748; background: #0a0f1d; color: white; border-radius: 12px; text-align: center; }
        .btn-unlock { background: var(--primary); color: #000; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 90%; }

        /* Contenedor Principal */
        #app-content { display: none; max-width: 500px; width: 100%; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Herramientas (Afinador y Metrónomo) */
        .tools-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .tool-card { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid #2d3748; text-align: center; }
        .tool-card h4 { margin: 0 0 10px 0; font-size: 0.8em; color: var(--primary); text-transform: uppercase; }
        
        .tuner-btns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .tuner-btn { background: #0a0f1d; border: 1px solid #334155; color: white; padding: 5px; border-radius: 8px; font-size: 0.7em; cursor: pointer; }
        
        .metro-controls { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .metro-btn { background: var(--primary); border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-weight: bold; }

        /* Imagen y Contenido */
        .image-viewer { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 20px; margin-bottom: 20px; overflow: hidden; border: 1px solid #334155; position: relative; }
        .image-viewer img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        
        .lesson-card { background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid #2d3748; }
        .task-item { background: #0a0f1d; border-radius: 15px; margin-bottom: 10px; border: 1px solid #2d3748; padding: 15px; cursor: pointer; }
        .task-item.completed { border-color: #10b981; background: #064e3b33; }
        .task-item span { font-size: 0.9em; display: block; color: #94a3b8; margin-top: 5px; }

        /* Barra Inferior de Navegación */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; padding: 15px; display: flex; justify-content: space-around; border-top: 1px solid #334155; z-index: 100; }
        .nav-btn { background: #334155; color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .nav-btn.next { background: var(--primary); color: black; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="logo-circle">1%</div>
    <h2>Guitarra con Jose</h2>
    <input type="text" id="pass-input" placeholder="Clave de Alumno">
    <button class="btn-unlock" id="unlock-button">ENTRAR</button>
</div>

<div id="app-content">
    <div class="tools-grid">
        <div class="tool-card">
            <h4>Afinador (Ref)</h4>
            <div class="tuner-btns">
                <button class="tuner-btn" onclick="playNote(82.41)">E</button>
                <button class="tuner-btn" onclick="playNote(110.00)">A</button>
                <button class="tuner-btn" onclick="playNote(146.83)">D</button>
                <button class="tuner-btn" onclick="playNote(196.00)">G</button>
                <button class="tuner-btn" onclick="playNote(246.94)">B</button>
                <button class="tuner-btn" onclick="playNote(329.63)">e</button>
            </div>
        </div>
        <div class="tool-card">
            <h4>Metrónomo</h4>
            <div class="metro-controls">
                <span id="bpm-display">80</span>
                <button class="metro-btn" id="metro-toggle">▶</button>
            </div>
        </div>
    </div>

    <div class="image-viewer"><img id="main-img" src="" alt="Clase"></div>

    <div class="lesson-card">
        <h3 id="lesson-title" style="margin: 0;"></h3>
        <p id="lesson-day" style="color: var(--primary); font-size: 0.8em; font-weight: bold; margin-bottom: 20px;"></p>
        <div id="tasks-container"></div>
    </div>
</div>

<div class="nav-bar" id="nav-bar" style="display: none;">
    <button class="nav-btn" onclick="changeDay(-1)">Anterior</button>
    <button class="nav-btn next" onclick="changeDay(1)">Siguiente</button>
</div>

<script>
    const SECRET_KEY = "GUITARRA1";
    let currentDay = parseInt(localStorage.getItem('saved_day')) || 0;
    let isPlaying = false;
    let metroInterval;

    const plan = [
        { t: "Postura Correcta", img: "https://images.unsplash.com/photo-1550291652-6ea9114a47b1?q=80&w=800", tasks: ["Cuerpo recto y relajado", "Guitarra apoyada en la pierna"] },
        { t: "Acorde Do Mayor (C)", img: "https://images.unsplash.com/photo-1510915361894-db8b60106cb1?q=80&w=800", tasks: ["Dedo 1: Traste 1, Cuerda 2", "Dedo 2: Traste 2, Cuerda 4", "Dedo 3: Traste 3, Cuerda 5"] },
        { t: "Acorde Re Mayor (D)", img: "https://images.unsplash.com/photo-1516924962500-2b4b3b99ea02?q=80&w=800", tasks: ["Dedo 1: T2 C3", "Dedo 2: T2 C1", "Dedo 3: T3 C2"] },
        // ... (Aquí irían los 30 días con la misma estructura)
    ];

    // Simular el resto de días para que no falle la app
    for(let i=3; i<30; i++) {
        plan.push({ 
            t: `Lección Día ${i+1}`, 
            img: "https://images.unsplash.com/photo-1550291652-6ea9114a47b1?q=80&w=800", 
            tasks: ["Práctica este movimiento por 5 min", "Mantén el ritmo constante"] 
        });
    }

    function updateUI() {
        const day = plan[currentDay];
        document.getElementById('lesson-title').innerText = day.t;
        document.getElementById('lesson-day').innerText = `DÍA ${currentDay + 1} / 30 - 1% COMPLETADO`;
        document.getElementById('main-img').src = day.img;
        
        const container = document.getElementById('tasks-container');
        container.innerHTML = "";
        day.tasks.forEach((task, index) => {
            const div = document.createElement('div');
            div.className = `task-item ${localStorage.getItem(`day_${currentDay}_task_${index}`) ? 'completed' : ''}`;
            div.innerHTML = `<b>Paso ${index + 1}</b> <span>${task}</span>`;
            div.onclick = () => {
                div.classList.toggle('completed');
                if(div.classList.contains('completed')) localStorage.setItem(`day_${currentDay}_task_${index}`, 'true');
                else localStorage.removeItem(`day_${currentDay}_task_${index}`);
            };
            container.appendChild(div);
        });
        localStorage.setItem('saved_day', currentDay);
    }

    function changeDay(dir) {
        if(currentDay + dir >= 0 && currentDay + dir < 30) {
            currentDay += dir;
            updateUI();
            window.scrollTo(0,0);
        }
    }

    // Afinador (Generador de Tonos)
    function playNote(freq) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        g.gain.setValueAtTime(0.5, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 1.5);
        osc.connect(g);
        g.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 1.5);
    }

    // Metrónomo
    document.getElementById('metro-toggle').onclick = function() {
        isPlaying = !isPlaying;
        this.innerText = isPlaying ? "■" : "▶";
        if(isPlaying) {
            metroInterval = setInterval(() => playNote(440), 750); // 80 BPM aprox
        } else {
            clearInterval(metroInterval);
        }
    };

    document.getElementById('unlock-button').onclick = () => {
        if(document.getElementById('pass-input').value.toUpperCase() === SECRET_KEY) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('nav-bar').style.display = 'flex';
            updateUI();
        }
    };

    window.onload = () => { if(localStorage.getItem('saved_day')) { /* Auto login si ya entró */ } };
</script>
</body>
</html>
