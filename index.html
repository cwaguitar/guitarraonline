<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guitarra con Jose | Tu 1% Diario</title>
    <style>
        :root { --primary: #fbbf24; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #f59e0b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; margin: 0; }
        
        /* Pantalla de Acceso */
        #auth-screen { 
            max-width: 450px; width: 100%; text-align: center; margin-top: 40px; 
            background: var(--card); padding: 40px 25px; border-radius: 28px; border: 1px solid #334155;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .logo-circle { width: 90px; height: 90px; background: var(--primary); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 28px; margin: 0 auto 25px; box-shadow: 0 0 30px rgba(251, 191, 36, 0.2); }
        
        h2 { font-size: 1.8em; margin-bottom: 5px; letter-spacing: -0.5px; color: white; }
        .tagline { color: var(--primary); font-weight: bold; margin-bottom: 20px; text-transform: uppercase; font-size: 0.9em; letter-spacing: 1px; }
        .manifesto { font-size: 0.95em; line-height: 1.6; color: #94a3b8; margin-bottom: 25px; font-style: italic; padding: 0 10px; border-left: 2px solid var(--primary); margin: 0 20px 25px 20px; }
        
        input { width: 85%; padding: 16px; margin-bottom: 15px; border: 2px solid #334155; background: #0f172a; color: white; border-radius: 14px; font-size: 1em; text-align: center; outline: none; }
        input:focus { border-color: var(--primary); }
        
        .btn-unlock { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 14px; font-weight: 800; cursor: pointer; width: 92%; font-size: 1.1em; transition: all 0.2s; }
        .btn-unlock:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(251, 191, 36, 0.3); }

        /* Contenido de la App */
        #app-content { display: none; max-width: 600px; width: 100%; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .progress-wrapper { width: 100%; margin: 20px 0; }
        .progress-container { background: #334155; height: 10px; border-radius: 5px; overflow: hidden; }
        #progress-bar { background: var(--primary); height: 100%; width: 0%; transition: width 0.7s ease-in-out; }

        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 20px; margin-bottom: 25px; overflow: hidden; border: 1px solid #334155; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); }
        .video-container iframe { width: 100%; height: 100%; border: none; }

        .card { background: var(--card); padding: 30px; border-radius: 28px; border: 1px solid #334155; position: relative; }
        .lesson-tag { color: var(--primary); font-size: 0.85em; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        
        .task-list { list-style: none; padding: 0; margin: 25px 0; }
        .task-item { padding: 16px; background: #0f172a; border-radius: 15px; margin-bottom: 12px; display: flex; align-items: center; border-left: 4px solid var(--primary); }
        .task-item span { margin-left: 12px; font-weight: 500; }

        .controls { display: flex; justify-content: space-between; gap: 15px; margin-top: 30px; }
        .nav-btn { background: #334155; color: white; border: none; padding: 16px; border-radius: 16px; cursor: pointer; flex: 1; font-weight: 700; }
        .nav-btn.next { background: var(--primary); color: black; }
        .nav-btn:disabled { opacity: 0.15; cursor: not-allowed; }

        .quote-box { margin-top: 25px; padding-top: 20px; border-top: 1px solid #334155; color: #94a3b8; font-size: 0.95em; text-align: center; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="logo-circle">1%</div>
    <h2>Guitarra con Jose</h2>
    <p class="tagline">Tu 1% Diario</p>
    <p class="manifesto">
        "No te voy a enseñar a ser Jimi Hendrix en una semana. Te voy a enseñar a que no puedas pasar un solo día sin disfrutar de tu guitarra. Porque el secreto no es practicar mucho, sino no dejar de practicar nunca."
    </p>
    <input type="text" id="pass-input" placeholder="Tu Clave de Alumno">
    <button class="btn-unlock" id="unlock-button">EMPEZAR MI 1% CON JOSE</button>
</div>

<div id="app-content">
    <div class="progress-wrapper">
        <div style="display: flex; justify-content: space-between; font-size: 0.8em; margin-bottom: 8px; font-weight: bold;">
            <span>META DIARIA ACUMULADA</span>
            <span id="percent-text">0%</span>
        </div>
        <div class="progress-container"><div id="progress-bar"></div></div>
    </div>
    
    <div class="video-container" id="media-box"></div>

    <div class="card">
        <span class="lesson-tag" id="day-label">CLASE 01 / 30</span>
        <h2 id="day-title" style="margin: 10px 0 25px 0; color: white;"></h2>
        
        <div class="task-list" id="task-list"></div>

        <div class="controls">
            <button class="nav-btn" id="prevBtn">Anterior</button>
            <button class="nav-btn next" id="nextBtn">Siguiente Nivel</button>
        </div>
        <div class="quote-box">
            <span id="pro-quote"></span>
        </div>
    </div>
</div>

<script>
    const SECRET_KEY = "GUITARRA1"; // Clave para tus alumnos
    let currentDay = 0;

    const plan = [
        { 
            title: "Postura y Primer Rasgueo", 
            video: "https://www.youtube.com/embed/dQw4w9WgXcQ", 
            tasks: ["Espalda recta, hombros relajados", "Sujeción de púa (o pulgar)", "4 Rasgueos lentos hacia abajo"],
            quote: "Hoy has ganado tu primer 1%. El camino empieza aquí con Jose."
        },
        { 
            title: "La Araña: Agilidad de dedos", 
            video: "https://www.youtube.com/embed/dQw4w9WgXcQ",
            tasks: ["Dedo 1 en traste 1", "Dedo 2 en traste 2", "No levantes los dedos de más"],
            quote: "La velocidad es la hija de la precisión. No corras."
        },
        { 
            title: "Tu primer acorde: Mi Menor (Em)", 
            video: "https://www.youtube.com/embed/dQw4w9WgXcQ",
            tasks: ["Dedo 2 en traste 2, cuerda 5", "Dedo 3 en traste 2, cuerda 4", "Haz sonar todas las cuerdas"],
            quote: "Un acorde hoy, una canción mañana. Sigue así."
        }
    ];

    function showApp() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-content').style.display = 'block';
        updateUI();
    }

    function updateUI() {
        const data = plan[currentDay];
        const progress = Math.round(((currentDay + 1) / 30) * 100); // Basado en meta de 30 días
        
        document.getElementById('day-label').innerText = `DÍA ${String(currentDay + 1).padStart(2, '0')} / 30`;
        document.getElementById('day-title').innerText = data.title;
        document.getElementById('pro-quote').innerText = `"${data.quote}"`;
        document.getElementById('percent-text').innerText = `${progress}%`;
        document.getElementById('progress-bar').style.width = `${progress}%`;
        
        const mediaBox = document.getElementById('media-box');
        mediaBox.innerHTML = data.video ? `<iframe src="${data.video}" allowfullscreen></iframe>` : `<p>Cargando técnica...</p>`;
        
        const list = document.getElementById('task-list');
        list.innerHTML = "";
        data.tasks.forEach(t => {
            const li = document.createElement('div');
            li.className = "task-item";
            li.innerHTML = `✅ <span>${t}</span>`;
            list.appendChild(li);
        });

        document.getElementById('prevBtn').disabled = (currentDay === 0);
        document.getElementById('nextBtn').innerText = (currentDay === plan.length - 1) ? "FINALIZAR HOY" : "SIGUIENTE 1%";
    }

    document.getElementById('unlock-button').onclick = function() {
        const userPass = document.getElementById('pass-input').value.trim().toUpperCase();
        if (userPass === SECRET_KEY || userPass === "GUITARRA") {
            localStorage.setItem('guitar_unlocked', 'true');
            showApp();
        } else {
            alert("Clave incorrecta. ¡Escríbeme si necesitas ayuda!");
        }
    };

    document.getElementById('prevBtn').onclick = () => { if(currentDay > 0) { currentDay--; updateUI(); } };
    document.getElementById('nextBtn').onclick = () => { if(currentDay < plan.length - 1) { currentDay++; updateUI(); } };

    window.onload = function() {
        if (localStorage.getItem('guitar_unlocked') === 'true') { showApp(); }
    };
</script>
</body>
</html>
