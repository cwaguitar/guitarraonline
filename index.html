<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jose Guitar | Elite Training</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #fbbf24; --bg: #05070a; --card: #10141d; --text: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 150px; overflow-x: hidden; }
        
        /* PORTADA */
        #auth-screen { 
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.9)), url('portada.JPG') center/cover;
            text-align: center; padding: 20px; box-sizing: border-box;
        }

        .hero-logo { font-family: 'Syncopate', sans-serif; font-size: 2.2rem; color: var(--primary); margin-bottom: 10px; }
        .login-box { background: rgba(0,0,0,0.8); padding: 30px; border-radius: 30px; border: 1px solid rgba(251,191,36,0.2); width: 100%; max-width: 300px; }
        input { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: white; border-radius: 12px; margin-bottom: 15px; text-align: center; box-sizing: border-box; }

        /* NAV */
        .top-nav { width: 100%; background: #000; padding: 15px 0; display: none; justify-content: center; gap: 20px; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 99; }
        .stat-item { font-size: 0.7rem; font-weight: 800; }

        /* CONTENIDO */
        #app-content { display: none; width: 95%; max-width: 500px; margin: 20px auto; }

        /* VIDEO */
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 20px; overflow: hidden; margin-bottom: 20px; border: 1px solid #333; }
        .video-container iframe { width: 100%; height: 100%; border: none; }

        /* MÁSTIL */
        .fretboard-card { background: var(--card); border-radius: 25px; padding: 20px; margin-bottom: 20px; border: 1px solid #222; }
        .fretboard { display: grid; grid-template-columns: repeat(6, 1fr); background: #1a1a1a; padding: 10px; border-radius: 8px; height: 160px; border-left: 4px solid #888; }
        .string { display: flex; flex-direction: column; justify-content: space-around; align-items: center; border-right: 1px solid #333; }
        .fret-mark { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #444; }
        .active-note { background: var(--primary); color: #000 !important; box-shadow: 0 0 15px var(--primary); font-weight: 900; }

        /* TABS */
        .tab-display { font-family: monospace; background: #000; padding: 15px; border-radius: 12px; color: var(--primary); overflow-x: auto; white-space: pre; font-size: 13px; border: 1px solid #222; margin: 10px 0; }
        
        .lesson-info { background: var(--card); border-radius: 25px; padding: 20px; border: 1px solid #222; }
        .task { background: #07090f; padding: 15px; border-radius: 15px; border: 1px solid #1a1f2e; margin-top: 10px; }
        .btn-glow { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; display: none; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="hero-logo">JOSE GUITAR</div>
    <div class="login-box">
        <input type="text" id="pass-input" placeholder="PASSCODE">
        <button class="btn-glow" onclick="login()">ENTRAR AL ELITE</button>
    </div>
</div>

<div class="top-nav" id="top-nav">
    <div class="stat-item">🔥 DÍA <span id="streak-num">1</span></div>
    <div class="stat-item">⭐ XP <span id="xp-num">0</span></div>
</div>

<div id="app-content">
    <div class="video-container">
        <iframe id="lesson-video" src="" allowfullscreen></iframe>
    </div>

    <div class="fretboard-card">
        <span style="font-family: 'Syncopate'; font-size: 0.6rem; color: var(--primary);">DIAGRAMA: <span id="chord-title">Cargando...</span></span>
        <div class="fretboard" id="fretboard"></div>
    </div>

    <div class="lesson-info">
        <span id="day-display" style="color: var(--primary); font-weight: 900; font-size: 0.7rem;">DÍA 01</span>
        <h2 id="title-display" style="margin: 5px 0; font-family: 'Syncopate'; font-size: 1rem;"></h2>
        
        <div class="tab-display" id="tab-content"></div>
        <div id="task-list"></div>
    </div>
</div>

<div class="bottom-nav" id="bottom-nav">
    <button class="btn-glow" id="next-btn" onclick="move()">COMPLETAR LECCIÓN</button>
</div>

<script>
    const ACCESS = "GUITARRA1";
    const TIEMPO_ESPERA = 0; // PRÁCTICA EN CERO PARA REVISIÓN
    
    // Forzamos inicio en 0 para que no salte al 30
    let currentDay = 0; 
    let xp = 0;

    const database = [
        { 
            t: "Acorde Maestro: Do Mayor", 
            v: "https://www.youtube.com/embed/dQw4w9WgXcQ", 
            chordName: "C Major",
            chordPattern: [null, 3, 2, 0, 1, 0],
            tabs: "E|---0---|\nB|---1---|\nG|---0---|\nD|---2---|\nA|---3---|\nE|-------|",
            steps: [{h: "Posición", p: "Cierra los ojos y busca la forma del Do.", r: "10 veces"}]
        },
        { 
            t: "Rock Power: Sol Mayor", 
            v: "https://www.youtube.com/embed/dQw4w9WgXcQ", 
            chordName: "G Major",
            chordPattern: [3, 2, 0, 0, 3, 3],
            tabs: "E|---3---|\nB|---3---|\nG|---0---|\nD|---0---|\nA|---2---|\nE|---3---|",
            steps: [{h: "Rasgueo", p: "Toca las 6 cuerdas con fuerza.", r: "20 veces"}]
        }
    ];

    // Rellenar el resto hasta 30 de forma segura
    if(database.length < 30) {
        for(let i = database.length; i < 30; i++) {
            database.push({
                t: `Lección Elite ${i+1}`,
                v: "https://www.youtube.com/embed/dQw4w9WgXcQ",
                chordName: "Acorde de Nivel " + i,
                chordPattern: [null, null, 0, 2, 3, 2],
                tabs: "E|---2---|\nB|---3---|\nG|---2---|\nD|---0---|\nA|-------|\nE|-------|",
                steps: [{h: "Técnica", p: "Sigue el video para esta lección.", r: "5 Min"}]
            });
        }
    }

    function initFretboard() {
        const board = document.getElementById('fretboard');
        board.innerHTML = "";
        for(let s=0; s<6; s++) {
            const str = document.createElement('div');
            str.className = "string";
            for(let f=0; f<=4; f++) {
                const mark = document.createElement('div');
                mark.className = "fret-mark";
                mark.id = `s${s}-f${f}`;
                mark.innerText = f === 0 ? "O" : f;
                str.appendChild(mark);
            }
            board.appendChild(str);
        }
    }

    function updateUI() {
        const d = database[currentDay];
        document.getElementById('day-display').innerText = `DÍA ${String(currentDay+1).padStart(2,'0')}`;
        document.getElementById('title-display').innerText = d.t;
        document.getElementById('lesson-video').src = d.v;
        document.getElementById('tab-content').innerText = d.tabs;
        document.getElementById('chord-title').innerText = d.chordName;
        document.getElementById('streak-num').innerText = currentDay + 1;
        document.getElementById('xp-num').innerText = xp;

        // Actualizar Mástil
        document.querySelectorAll('.fret-mark').forEach(m => m.classList.remove('active-note'));
        d.chordPattern.forEach((fret, sIndex) => {
            if(fret !== null) {
                const note = document.getElementById(`s${sIndex}-f${fret}`);
                if(note) note.classList.add('active-note');
            }
        });

        // Tareas
        const list = document.getElementById('task-list');
        list.innerHTML = "";
        d.steps.forEach(s => {
            const div = document.createElement('div');
            div.className = "task";
            div.innerHTML = `<b style="color:var(--primary); font-size:11px;">${s.h}</b><p style="margin:5px 0; font-size:13px; opacity:0.8;">${s.p}</p>`;
            list.appendChild(div);
        });

        // Botón con tiempo 0
        const btn = document.getElementById('next-btn');
        btn.innerText = "COMPLETAR DÍA " + (currentDay + 1);
        btn.disabled = false;
    }

    function login() {
        if(document.getElementById('pass-input').value.toUpperCase() === ACCESS) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('bottom-nav').style.display = 'block';
            document.getElementById('top-nav').style.display = 'flex';
            initFretboard();
            updateUI();
        } else { alert("PASSCODE INCORRECTO"); }
    }

    function move() {
        if(currentDay < 29) {
            currentDay++;
            xp += 100;
            updateUI();
            window.scrollTo(0,0);
        } else {
            alert("¡HAS COMPLETADO EL ENTRENAMIENTO ELITE!");
        }
    }
</script>

</body>
</html>
