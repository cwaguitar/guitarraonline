<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jose Guitar | Elite Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #fbbf24; --bg: #05070a; --card: #10141d; --text: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 160px; overflow-x: hidden; }
        
        /* PORTADA */
        #auth-screen { 
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.3) 0%, rgba(5,7,10,0.9) 80%), url('portada.JPG') center/cover no-repeat;
            text-align: center;
        }
        .login-box { background: rgba(0,0,0,0.7); padding: 30px; border-radius: 30px; border: 1px solid rgba(251,191,36,0.3); backdrop-filter: blur(10px); width: 85%; max-width: 320px; }

        /* NAV */
        .top-nav { width: 100%; background: #000; padding: 15px 0; display: none; justify-content: center; gap: 20px; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 99; }
        
        #app-content { display: none; width: 95%; max-width: 450px; margin: 20px auto; }

        /* MÁSTIL VERTICAL */
        .fretboard-card { background: var(--card); border-radius: 25px; padding: 30px 10px; margin-bottom: 20px; border: 1px solid #222; display: flex; flex-direction: column; align-items: center; }
        .fretboard-vertical { 
            width: 180px; height: 280px; background: #1a1a1a; position: relative; border-top: 8px solid #ddd; 
            display: flex; justify-content: space-between; padding: 0 10px; overflow: hidden; border-bottom: 2px solid #333;
        }
        .fret-line { position: absolute; left: 0; width: 100%; height: 2px; background: #333; z-index: 1; }
        .fl-1 { top: 70px; } .fl-2 { top: 140px; } .fl-3 { top: 210px; } .fl-4 { top: 278px; }
        .string-v { width: 2px; background: #444; height: 100%; position: relative; z-index: 2; }
        .finger { 
            width: 24px; height: 24px; background: var(--primary); border-radius: 50%; position: absolute; left: 50%; transform: translate(-50%, -50%); 
            z-index: 10; display: flex; align-items: center; justify-content: center; color: #000; font-size: 11px; font-weight: 900; box-shadow: 0 0 12px var(--primary);
        }
        .status-mark { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-weight: 900; font-size: 14px; }

        /* CONTENEDORES DE TEXTO */
        .info-box { background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid #222; line-height: 1.5; }
        .guide-box { background: #000; border: 2px dashed var(--primary); padding: 15px; border-radius: 15px; margin: 15px 0; color: var(--primary); font-weight: 700; text-align: center; }
        .tab-box { font-family: 'Courier New', monospace; background: #000; padding: 15px; border-radius: 10px; color: #888; white-space: pre; font-size: 14px; border: 1px solid #111; overflow-x: auto; }

        .btn-main { background: var(--primary); color: #000; border: none; padding: 20px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, var(--bg) 50%); padding: 40px 0 20px; display: none; z-index: 100; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="hero-logo">JOSE GUITAR</div>
    <div class="login-box">
        <input type="password" id="pass-input" placeholder="PASSCODE" style="width:100%; padding:15px; border-radius:12px; border:none; background:#111; color:white; text-align:center; margin-bottom:15px; box-sizing:border-box;">
        <button class="btn-main" onclick="login()">INGRESAR</button>
    </div>
</div>

<div class="top-nav" id="top-nav">
    <div style="font-size: 0.8rem; font-weight: 900;">DÍA <span id="day-num">1</span></div>
    <div style="font-size: 0.7rem; color: var(--primary); font-family:'Syncopate'">LEVEL: ELITE</div>
</div>

<div id="app-content">
    <div style="width:100%; aspect-ratio:16/9; background:#000; border-radius:20px; overflow:hidden; border:1px solid #333; margin-bottom:20px;">
        <iframe id="vid-frame" src="" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
    </div>

    <div id="mastro-container" class="fretboard-card">
        <h2 id="chord-name" style="margin: 0 0 20px 0; font-family: 'Syncopate'; font-size: 1.1rem; color: var(--primary);">---</h2>
        <div class="fretboard-vertical">
            <div class="fret-line fl-1"></div><div class="fret-line fl-2"></div><div class="fret-line fl-3"></div><div class="fret-line fl-4"></div>
            <div class="string-v" id="str0"></div><div class="string-v" id="str1"></div><div class="string-v" id="str2"></div>
            <div class="string-v" id="str3"></div><div class="string-v" id="str4"></div><div class="string-v" id="str5"></div>
        </div>
    </div>

    <div class="info-box">
        <h3 id="lesson-title" style="margin:0; font-size:1.2rem; color:var(--primary);"></h3>
        <div id="extra-guide"></div>
        <p id="lesson-desc" style="font-size:0.95rem; opacity:0.8; margin:15px 0;"></p>
        <div class="tab-box" id="tab-data"></div>
    </div>
</div>

<div class="bottom-nav" id="bottom-nav">
    <div style="width: 90%; max-width: 400px; margin: 0 auto;">
        <button class="btn-main" onclick="nextDay()">SIGUIENTE PASO ✓</button>
    </div>
</div>

<script>
    const CLAVE = "GUITARRA1";
    let currentDay = 0;

    // ORDENACIÓN POR ESCALA: C, D, E, F, G, A, B
    const acordesBase = [
        // MAYORES (1-7)
        { t: "Do Mayor (C)", n: "C", p: ["X", 3, 2, 0, 1, 0], d: "El acorde base para entender la armonía.", b: "E|--0--\nB|--1--\nG|--0--\nD|--2--\nA|--3--\nE|--X--" },
        { t: "Re Mayor (D)", n: "D", p: ["X", "X", 0, 2, 3, 2], d: "Ideal para canciones brillantes. Evita tocar la 5ta y 6ta cuerda.", b: "E|--2--\nB|--3--\nG|--2--\nD|--0--" },
        { t: "Mi Mayor (E)", n: "E", p: [0, 2, 2, 1, 0, 0], d: "Poderoso y profundo. Usa todas las cuerdas.", b: "Todas las cuerdas suenan." },
        { t: "Fa Mayor (F)", n: "F", p: [1, 3, 3, 2, 1, 1], d: "Tu primera cejilla. Presiona firme con el índice.", b: "Cejilla en Traste 1" },
        { t: "Sol Mayor (G)", n: "G", p: [3, 2, 0, 0, 3, 3], d: "Versión de 4 dedos para mayor brillo.", b: "E|--3--\nB|--3--" },
        { t: "La Mayor (A)", n: "A", p: ["X", 0, 2, 2, 2, 0], d: "Tres dedos en el mismo traste. No pises las cuerdas vecinas.", b: "Traste 2: cuerdas 2,3,4" },
        { t: "Si Mayor (B)", n: "B", p: ["X", 2, 4, 4, 4, 2], d: "Cejilla en el traste 2. Paciencia con este.", b: "Forma de A con cejilla." },
        
        // MENORES (8-14)
        { t: "Do Menor (Cm)", n: "Cm", p: ["X", 3, 5, 5, 4, 3], d: "Cejilla en traste 3.", b: "Traste 3" },
        { t: "Re Menor (Dm)", n: "Dm", p: ["X", "X", 0, 2, 3, 1], d: "Triste y melancólico.", b: "E|--1--" },
        { t: "Mi Menor (Em)", n: "Em", p: [0, 2, 2, 0, 0, 0], d: "Solo dos dedos. El más fácil y usado.", b: "Dedos 2 y 3." },
        { t: "Fa Menor (Fm)", n: "Fm", p: [1, 3, 3, 1, 1, 1], d: "Igual al Fa mayor pero quita el dedo medio.", b: "Cejilla completa." },
        { t: "Sol Menor (Gm)", n: "Gm", p: [3, 5, 5, 3, 3, 3], d: "Cejilla en traste 3.", b: "Fuerza en el índice." },
        { t: "La Menor (Am)", n: "Am", p: ["X", 0, 2, 2, 1, 0], d: "Base de muchísimas baladas.", b: "Similar al Mi mayor." },
        { t: "Si Menor (Bm)", n: "Bm", p: ["X", 2, 4, 4, 3, 2], d: "El menor con cejilla más importante.", b: "Traste 2." },

        // SEPTIMOS (15-21)
        { t: "Do Séptima (C7)", n: "C7", p: ["X", 3, 2, 3, 1, 0], d: "Añade el meñique en la cuerda 3.", b: "Sonido Blues." },
        { t: "Re Séptima (D7)", n: "D7", p: ["X", "X", 0, 2, 1, 2], d: "Triángulo invertido.", b: "E|--2--\nB|--1--" },
        { t: "Mi Séptima (E7)", n: "E7", p: [0, 2, 0, 1, 0, 0], d: "Quita un dedo del Mi mayor.", b: "Tensión pura." },
        { t: "Fa Séptima (F7)", n: "F7", p: [1, 3, 1, 2, 1, 1], d: "Cejilla con tensión.", b: "Traste 1." },
        { t: "Sol Séptima (G7)", n: "G7", p: [3, 2, 0, 0, 0, 1], d: "Acorde de salida dominante.", b: "E|--1--" },
        { t: "La Séptima (A7)", n: "A7", p: ["X", 0, 2, 0, 2, 0], d: "Solo dos dedos con espacio en medio.", b: "Cuerdas 2 y 4." },
        { t: "Si Séptima (B7)", n: "B7", p: ["X", 2, 1, 2, 0, 2], d: "Acorde de posición abierta avanzado.", b: "A7 con cejilla." }
    ];

    // DÍAS 22-30: GUÍAS RÍTMICAS (SIN MÁSTIL)
    const ideasProgresivas = [
        { t: "Ritmo Rock 4/4", n: "GUÍA RÍTMICA", d: "Aprende el movimiento básico. Mantén la mano como un péndulo.", g: "ABAJO - ABAJO - ARRIBA - ARRIBA - ABAJO", b: "1  2  &  &  4" },
        { t: "Cambio de Precisión", n: "PROGRESIÓN G-D", d: "Alterna entre Sol y Re cada dos pulsos. No detengas el rasgueo.", g: "G [↓↓] - D [↓↓]", b: "Objetivo: Cero silencio entre cambios." },
        { t: "La Progresión Pop", n: "C - G - Am - F", d: "Toca 4 veces cada acorde con el ritmo del Día 22.", g: "C > G > Am > F", b: "La base de 1000 canciones." },
        { t: "Arpegio de Balada", n: "TÉCNICA P-I-M-A", d: "Usa los dedos individualmente. Pulgar para bajos, resto para agudas.", g: "Pulgar - Indice - Medio - Anular", b: "Suave y constante." },
        { t: "Ritmo de Blues Shuffle", n: "EL SWING", d: "Ritmo ternario. Imagina un caballo galopando.", g: "Daa-da / Daa-da / Daa-da", b: "Acentúa el segundo golpe." },
        { t: "Palm Mute (Apagado)", n: "ROCK STYLE", d: "Apoya la mano derecha en el puente. Sonido percusivo.", g: "Mute - Mute - Abierto", b: "Usa distorsión si tienes." },
        { t: "Independencia de Dedos", n: "EJERCICIO FÍSICO", d: "Sube y baja por las cuerdas. 1 dedo por traste.", g: "1 - 2 - 3 - 4", b: "No levantes los dedos previos." },
        { t: "Balada Hallelujah", n: "CANCIÓN FINAL", d: "Combina arpegio y cambios. C, Am, F, G.", g: "C - Am - C - Am - F - G", b: "Siente la melodía." },
        { t: "GRADUACIÓN ELITE", n: "MAESTRÍA", d: "¡Felicidades! Has completado el ciclo. Crea tu propia secuencia.", g: "LIBERTAD TOTAL", b: "¡ERES GUITARRISTA!" }
    ];

    const planGlobal = [...acordesBase, ...ideasProgresivas];

    function drawChord(p) {
        document.querySelectorAll('.finger, .status-mark').forEach(e => e.remove());
        p.forEach((val, i) => {
            const str = document.getElementById(`str${i}`);
            if (val === "X") str.innerHTML += `<span class="status-mark" style="color:#ff4444">X</span>`;
            else if (val === 0) str.innerHTML += `<span class="status-mark" style="color:var(--primary)">O</span>`;
            else if (typeof val === 'number') {
                const topPos = (val * 70) - 35;
                str.innerHTML += `<div class="finger" style="top:${topPos}px">${val}</div>`;
            }
        });
    }

    function render() {
        const d = planGlobal[currentDay];
        document.getElementById('day-num').innerText = currentDay + 1;
        document.getElementById('lesson-title').innerText = d.t;
        document.getElementById('lesson-desc').innerText = d.d;
        document.getElementById('tab-data').innerText = d.b;

        // LÓGICA DE VISIBILIDAD
        const mastil = document.getElementById('mastro-container');
        const extra = document.getElementById('extra-guide');

        if(currentDay < 21) {
            mastil.style.display = 'flex';
            extra.innerHTML = "";
            document.getElementById('chord-name').innerText = d.n;
            drawChord(d.p);
        } else {
            mastil.style.display = 'none';
            extra.innerHTML = `<div class="guide-box">${d.g}</div>`;
        }
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function login() {
        if(document.getElementById('pass-input').value.toUpperCase() === CLAVE) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('top-nav').style.display = 'flex';
            document.getElementById('bottom-nav').style.display = 'block';
            render();
        }
    }

    function nextDay() {
        if(currentDay < planGlobal.length - 1) {
            currentDay++;
            render();
        }
    }
</script>
</body>
</html>
